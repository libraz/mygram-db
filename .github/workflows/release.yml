name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-rpm:
    name: Build RPM (${{ matrix.el_version }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # el9
          - arch: x86_64
            el_version: "9"
            runner: ubuntu-latest
            docker_platform: linux/amd64
          - arch: aarch64
            el_version: "9"
            runner: ubuntu-24.04-arm
            docker_platform: linux/arm64
          # el10
          - arch: x86_64
            el_version: "10"
            runner: ubuntu-latest
            docker_platform: linux/amd64
          - arch: aarch64
            el_version: "10"
            runner: ubuntu-24.04-arm
            docker_platform: linux/arm64
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build RPM builder Docker image
        run: |
          docker buildx build \
            --platform ${{ matrix.docker_platform }} \
            --build-arg EL_VERSION=${{ matrix.el_version }} \
            --load \
            --cache-from type=gha,scope=rpmbuild-el${{ matrix.el_version }}-${{ matrix.arch }} \
            --cache-to type=gha,mode=max,scope=rpmbuild-el${{ matrix.el_version }}-${{ matrix.arch }} \
            -f support/rpm/Dockerfile.rpmbuild \
            -t mygramdb-rpmbuild:${{ steps.version.outputs.version }}-el${{ matrix.el_version }}-${{ matrix.arch }} \
            .

      - name: Create source tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NAME="mygramdb"
          mkdir -p "$GITHUB_WORKSPACE/rpmsources"
          git archive --format=tar.gz --prefix="${NAME}-${VERSION}/" HEAD \
            > "$GITHUB_WORKSPACE/rpmsources/${NAME}-${VERSION}.tar.gz"

      - name: Build RPM packages
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist/rpm"
          docker run --rm \
            --platform ${{ matrix.docker_platform }} \
            -e MYGRAMDB_VERSION="${{ steps.version.outputs.version }}" \
            -v "$GITHUB_WORKSPACE/rpmsources:/rpmsources:ro" \
            -v "$GITHUB_WORKSPACE/dist:/workspace/dist" \
            mygramdb-rpmbuild:${{ steps.version.outputs.version }}-el${{ matrix.el_version }}-${{ matrix.arch }}

      - name: Collect main RPM only
        id: collect
        run: |
          # Keep only the main package (exclude debuginfo/debugsource/devel/src)
          MAIN_RPM=$(find dist/rpm -name "mygramdb-${{ steps.version.outputs.version }}-*.el${{ matrix.el_version }}.${{ matrix.arch }}.rpm" \
            ! -name "*debuginfo*" ! -name "*debugsource*" ! -name "*devel*" -print -quit)

          if [ -z "$MAIN_RPM" ]; then
            echo "Error: Main RPM not found"
            ls -la dist/rpm/
            exit 1
          fi

          mkdir -p dist/release
          cp "$MAIN_RPM" dist/release/
          echo "Releasing: $(basename $MAIN_RPM)"
          ls -lh dist/release/

      - name: Test RPM installation
        run: |
          MAIN_RPM=$(ls dist/release/mygramdb-*.rpm | head -1)
          docker run --rm \
            --platform ${{ matrix.docker_platform }} \
            -v "$GITHUB_WORKSPACE/dist/release:/dist:ro" \
            almalinux:${{ matrix.el_version }} bash -c "
            set -e
            dnf install -y --nogpgcheck https://dev.mysql.com/get/mysql84-community-release-el${{ matrix.el_version }}-1.noarch.rpm
            dnf module disable -y mysql 2>/dev/null || true
            dnf install -y --nogpgcheck /dist/$(basename $MAIN_RPM)
            test -x /usr/bin/mygramdb && echo 'mygramdb: OK'
            test -x /usr/bin/mygram-cli && echo 'mygram-cli: OK'
            ldd /usr/bin/mygramdb | grep -q 'not found' && exit 1 || echo 'Dependencies: OK'
            echo '=== Installation test passed! ==='
          "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-el${{ matrix.el_version }}-${{ matrix.arch }}
          path: dist/release/*.rpm
          retention-days: 30
          if-no-files-found: error

  build-deb:
    name: Build DEB (${{ matrix.codename }}, ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # Ubuntu 22.04 (jammy)
          - arch: x86_64
            ubuntu_version: "22.04"
            codename: jammy
            deb_arch: amd64
            runner: ubuntu-latest
            docker_platform: linux/amd64
          - arch: aarch64
            ubuntu_version: "22.04"
            codename: jammy
            deb_arch: arm64
            runner: ubuntu-24.04-arm
            docker_platform: linux/arm64
          # Ubuntu 24.04 (noble)
          - arch: x86_64
            ubuntu_version: "24.04"
            codename: noble
            deb_arch: amd64
            runner: ubuntu-latest
            docker_platform: linux/amd64
          - arch: aarch64
            ubuntu_version: "24.04"
            codename: noble
            deb_arch: arm64
            runner: ubuntu-24.04-arm
            docker_platform: linux/arm64
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build DEB builder Docker image
        run: |
          docker buildx build \
            --platform ${{ matrix.docker_platform }} \
            --build-arg UBUNTU_VERSION=${{ matrix.ubuntu_version }} \
            --load \
            --cache-from type=gha,scope=debbuild-${{ matrix.codename }}-${{ matrix.arch }} \
            --cache-to type=gha,mode=max,scope=debbuild-${{ matrix.codename }}-${{ matrix.arch }} \
            -f support/deb/Dockerfile.debbuild \
            -t mygramdb-debbuild:${{ steps.version.outputs.version }}-${{ matrix.codename }}-${{ matrix.arch }} \
            .

      - name: Create source tarball
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          NAME="mygramdb"
          mkdir -p "$GITHUB_WORKSPACE/sources"
          git archive --format=tar.gz --prefix="${NAME}-${VERSION}/" HEAD \
            > "$GITHUB_WORKSPACE/sources/${NAME}-${VERSION}.tar.gz"

      - name: Build DEB packages
        run: |
          mkdir -p "$GITHUB_WORKSPACE/dist/deb"
          docker run --rm \
            --platform ${{ matrix.docker_platform }} \
            -e MYGRAMDB_VERSION="${{ steps.version.outputs.version }}" \
            -v "$GITHUB_WORKSPACE/sources:/sources:ro" \
            -v "$GITHUB_WORKSPACE/dist:/workspace/dist" \
            mygramdb-debbuild:${{ steps.version.outputs.version }}-${{ matrix.codename }}-${{ matrix.arch }}

      - name: Collect main DEB only
        run: |
          # Keep only the main .deb (exclude -dbgsym, .ddeb, .buildinfo, .changes)
          MAIN_DEB=$(find dist/deb -name "mygramdb_${{ steps.version.outputs.version }}-*~${{ matrix.codename }}_${{ matrix.deb_arch }}.deb" \
            ! -name "*dbgsym*" -print -quit)

          if [ -z "$MAIN_DEB" ]; then
            echo "Error: Main DEB not found"
            ls -la dist/deb/
            exit 1
          fi

          mkdir -p dist/release
          cp "$MAIN_DEB" dist/release/
          echo "Releasing: $(basename $MAIN_DEB)"
          ls -lh dist/release/

      - name: Test DEB installation
        run: |
          MAIN_DEB=$(ls dist/release/mygramdb_*.deb | head -1)
          docker run --rm \
            --platform ${{ matrix.docker_platform }} \
            -v "$GITHUB_WORKSPACE/dist/release:/dist:ro" \
            ubuntu:${{ matrix.ubuntu_version }} bash -c "
            set -e
            apt-get update
            apt-get install -y /dist/$(basename $MAIN_DEB)
            test -x /usr/bin/mygramdb && echo 'mygramdb: OK'
            test -x /usr/bin/mygram-cli && echo 'mygram-cli: OK'
            ldd /usr/bin/mygramdb | grep -q 'not found' && exit 1 || echo 'Dependencies: OK'
            echo '=== Installation test passed! ==='
          "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.codename }}-${{ matrix.deb_arch }}
          path: dist/release/*.deb
          retention-days: 30
          if-no-files-found: error

  create-release:
    name: Create GitHub Release
    needs: [build-rpm, build-deb]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/packages
          merge-multiple: true

      - name: List release artifacts
        run: |
          echo "Release packages:"
          ls -lh dist/packages/

      - name: Check for release notes
        id: check_notes
        run: |
          NOTES_FILE="docs/releases/v${{ steps.version.outputs.version }}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "found=true" >> $GITHUB_OUTPUT
          else
            echo "found=false" >> $GITHUB_OUTPUT
          fi

      - name: Copy release notes to dist (if exists)
        if: steps.check_notes.outputs.found == 'true'
        run: |
          cp "docs/releases/v${{ steps.version.outputs.version }}.md" \
             "dist/RELEASE_NOTES_v${{ steps.version.outputs.version }}.md"

      - name: Generate SHA256 checksums
        run: |
          cd dist/packages
          find . -maxdepth 1 \( -name "*.rpm" -o -name "*.deb" \) -exec sha256sum {} + > SHA256SUMS
          echo "Generated checksums:"
          cat SHA256SUMS

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: false
          files: |
            dist/packages/*.rpm
            dist/packages/*.deb
            dist/packages/SHA256SUMS
            dist/RELEASE_NOTES_*.md
          fail_on_unmatched_files: false
          body: |
            ## MygramDB ${{ steps.version.outputs.version }}

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) or [docs/releases/v${{ steps.version.outputs.version }}.md](https://github.com/${{ github.repository }}/blob/main/docs/releases/v${{ steps.version.outputs.version }}.md) for details.

            ### Docker Images (Recommended)

            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ steps.version.outputs.version }}
            docker pull ghcr.io/${{ github.repository }}:latest
            ```

            **Architectures**: linux/amd64, linux/arm64

            See [Docker Deployment Guide](https://github.com/${{ github.repository }}/blob/main/docs/en/docker-deployment.md) for details.

            ---

            ### RPM Packages (RHEL/AlmaLinux/Rocky Linux)

            ```bash
            # Install MySQL repository (required)
            sudo dnf install -y --nogpgcheck https://dev.mysql.com/get/mysql84-community-release-el$(rpm -E %rhel)-1.noarch.rpm
            sudo dnf module disable -y mysql 2>/dev/null || true

            # Install MygramDB
            sudo dnf install -y ./mygramdb-${{ steps.version.outputs.version }}-1.el$(rpm -E %rhel).$(uname -m).rpm

            # Configure and start
            sudo cp /etc/mygramdb/config.yaml.example /etc/mygramdb/config.yaml
            sudo vi /etc/mygramdb/config.yaml
            sudo systemctl enable --now mygramdb
            ```

            | Platform | x86_64 | aarch64 |
            |----------|--------|---------|
            | EL9 (RHEL/Alma/Rocky 9) | `mygramdb-${{ steps.version.outputs.version }}-1.el9.x86_64.rpm` | `mygramdb-${{ steps.version.outputs.version }}-1.el9.aarch64.rpm` |
            | EL10 (RHEL/Alma/Rocky 10) | `mygramdb-${{ steps.version.outputs.version }}-1.el10.x86_64.rpm` | `mygramdb-${{ steps.version.outputs.version }}-1.el10.aarch64.rpm` |

            ---

            ### DEB Packages (Ubuntu)

            ```bash
            sudo apt-get update
            sudo apt-get install -y ./mygramdb_${{ steps.version.outputs.version }}-1~$(lsb_release -cs)_$(dpkg --print-architecture).deb

            # Configure and start
            sudo cp /etc/mygramdb/config.yaml.example /etc/mygramdb/config.yaml
            sudo vi /etc/mygramdb/config.yaml
            sudo systemctl enable --now mygramdb
            ```

            | Platform | amd64 | arm64 |
            |----------|-------|-------|
            | Ubuntu 22.04 (Jammy) | `mygramdb_${{ steps.version.outputs.version }}-1~jammy_amd64.deb` | `mygramdb_${{ steps.version.outputs.version }}-1~jammy_arm64.deb` |
            | Ubuntu 24.04 (Noble) | `mygramdb_${{ steps.version.outputs.version }}-1~noble_amd64.deb` | `mygramdb_${{ steps.version.outputs.version }}-1~noble_arm64.deb` |

            ---

            ### Package Contents
            - `/usr/bin/mygramdb` — Server binary
            - `/usr/bin/mygram-cli` — CLI client
            - `/usr/lib/systemd/system/mygramdb.service` — Systemd service
            - `/etc/mygramdb/config.yaml.example` — Example configuration
            - `/var/lib/mygramdb/` — Data directory
