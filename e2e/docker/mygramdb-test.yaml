mysql:
  host: "127.0.0.1"
  port: 13306
  user: "repl_user"
  password: "test_password"
  database: "testdb"
  use_gtid: true
  connect_timeout_ms: 5000
  datetime_timezone: "+00:00"

tables:
  - name: "articles"
    primary_key: "id"
    text_source:
      column: "content"
    required_filters:
      - name: "enabled"
        type: "int"
        op: "="
        value: 1
        bitmap_index: false
    filters:
      - name: "status"
        type: "int"
        dict_compress: false
        bitmap_index: false
      - name: "category"
        type: "string"
        dict_compress: false
        bitmap_index: false
    ngram_size: 2
    kanji_ngram_size: 1

  - name: "products"
    primary_key: "id"
    text_source:
      column: "description"
    required_filters:
      - name: "enabled"
        type: "int"
        op: "="
        value: 1
        bitmap_index: false
    filters:
      - name: "status"
        type: "int"
        dict_compress: false
        bitmap_index: false
      - name: "category"
        type: "string"
        dict_compress: false
        bitmap_index: false
    ngram_size: 2
    kanji_ngram_size: 1

build:
  batch_size: 5000
  parallelism: 2

replication:
  enable: true
  server_id: 99999
  start_from: "snapshot"

memory:
  hard_limit_mb: 256
  soft_target_mb: 200
  normalize:
    nfkc: true
    width: "narrow"
    lower: false

dump:
  dir: "e2e/results/dumps"
  interval_sec: 0

api:
  tcp:
    bind: "127.0.0.1"
    port: 11016
  http:
    enable: true
    bind: "127.0.0.1"
    port: 18080

network:
  allow_cidrs:
    - "0.0.0.0/0"

logging:
  level: "debug"
  format: "json"
  file: ""

cache:
  enabled: true
